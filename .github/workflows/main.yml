name: Sync from Gitee

on:
  schedule:
    - cron: '0 6 * * *' # 每天早上6点自动同步
  workflow_dispatch:     # 也可以手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 第一步：先从 Gitee 拉取代码
      - name: Checkout code from Gitee
        uses: actions/checkout@v4
        with:
          repository: 'jingyisi/jingyisi-my-project' # Gitee 仓库名
          token: ${{ secrets.GITEE_TOKEN }}          # 使用 Gitee 的 Token
          fetch-depth: 0                             # 获取所有历史记录

      # 第二步：将代码推送到 GitHub
      - name: Push to GitHub
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # 使用 GitHub 内置的 Token
          branch: 'main'                             # 推送到 main 分支
          force: true                                # 强制推送，确保同步
